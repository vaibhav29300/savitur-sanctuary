<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Radiant colour prana healing">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcebff"/>
      <stop offset="42%" stop-color="#ffe9c9"/>
      <stop offset="100%" stop-color="#ffd5a0"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="42%" r="46%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="28%" stop-color="#fff5d2" stop-opacity="0.95"/>
      <stop offset="62%" stop-color="#ffd27a" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#ffd27a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="petal" cx="50%" cy="100%" r="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffe9bd" stop-opacity="0.7"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#sky)"/>

  <!-- soft concentric energy rings -->
  <g fill="none" stroke="#ffffff" stroke-opacity="0.35">
    <circle cx="400" cy="250" r="150"/>
    <circle cx="400" cy="250" r="215" stroke-opacity="0.22"/>
    <circle cx="400" cy="250" r="285" stroke-opacity="0.14"/>
  </g>

  <!-- colour-prana sunburst -->
  <g transform="translate(400 250)" filter="url(#soft)" opacity="0.55">
    <g><path d="M0 0 L-24 -560 L24 -560 Z" fill="#ff6b6b" transform="rotate(0)"/></g>
    <g><path d="M0 0 L-24 -560 L24 -560 Z" fill="#ffa94d" transform="rotate(30)"/></g>
    <g><path d="M0 0 L-24 -560 L24 -560 Z" fill="#ffe066" transform="rotate(60)"/></g>
    <g><path d="M0 0 L-24 -560 L24 -560 Z" fill="#69db7c" transform="rotate(90)"/></g>
    <g><path d="M0 0 L-24 -560 L24 -560 Z" fill="#4dd0c2" transform="rotate(120)"/></g>
    <g><path d="M0 0 L-24 -560 L24 -560 Z" fill="#74c0fc" transform="rotate(150)"/></g>
    <g><path d="M0 0 L-24 -560 L24 -560 Z" fill="#b197fc" transform="rotate(180)"/></g>
    <g><path d="M0 0 L-24 -560 L24 -560 Z" fill="#ff6b6b" transform="rotate(210)"/></g>
    <g><path d="M0 0 L-24 -560 L24 -560 Z" fill="#ffa94d" transform="rotate(240)"/></g>
    <g><path d="M0 0 L-24 -560 L24 -560 Z" fill="#ffe066" transform="rotate(270)"/></g>
    <g><path d="M0 0 L-24 -560 L24 -560 Z" fill="#69db7c" transform="rotate(300)"/></g>
    <g><path d="M0 0 L-24 -560 L24 -560 Z" fill="#74c0fc" transform="rotate(330)"/></g>
  </g>

  <!-- luminous core -->
  <rect width="800" height="600" fill="url(#sun)"/>

  <!-- glowing lotus rising at the base -->
  <g transform="translate(400 615)">
    <ellipse cx="0" cy="0" rx="240" ry="120" fill="url(#sun)" opacity="0.7"/>
    <g stroke="#ffffff" stroke-opacity="0.5" stroke-width="1.5">
      <ellipse cx="0" cy="-78" rx="26" ry="86" fill="url(#petal)" transform="rotate(0)"/>
      <ellipse cx="0" cy="-78" rx="25" ry="82" fill="url(#petal)" transform="rotate(24)"/>
      <ellipse cx="0" cy="-78" rx="25" ry="82" fill="url(#petal)" transform="rotate(-24)"/>
      <ellipse cx="0" cy="-72" rx="23" ry="74" fill="url(#petal)" transform="rotate(48)"/>
      <ellipse cx="0" cy="-72" rx="23" ry="74" fill="url(#petal)" transform="rotate(-48)"/>
      <ellipse cx="0" cy="-64" rx="21" ry="64" fill="url(#petal)" transform="rotate(70)"/>
      <ellipse cx="0" cy="-64" rx="21" ry="64" fill="url(#petal)" transform="rotate(-70)"/>
    </g>
  </g>

  <!-- floating light particles -->
  <g fill="#ffffff">
    <circle cx="180" cy="150" r="5" opacity="0.85"/>
    <circle cx="640" cy="120" r="4" opacity="0.75"/>
    <circle cx="700" cy="300" r="6" opacity="0.6"/>
    <circle cx="120" cy="330" r="5" opacity="0.6"/>
    <circle cx="560" cy="430" r="4" opacity="0.7"/>
    <circle cx="250" cy="470" r="3" opacity="0.7"/>
    <circle cx="470" cy="90" r="3" opacity="0.8"/>
  </g>
</svg>
