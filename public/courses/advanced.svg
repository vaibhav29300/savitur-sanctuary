<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Radiant colour prana energy">
  <defs>
    <linearGradient id="bgA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d1f47"/>
      <stop offset="55%" stop-color="#3a3f7e"/>
      <stop offset="100%" stop-color="#5b62a6"/>
    </linearGradient>
    <radialGradient id="coreA" cx="50%" cy="42%" r="42%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="20%" stop-color="#fff4cf"/>
      <stop offset="46%" stop-color="#ffd06a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffd06a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="petalA" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ffd98f"/>
      <stop offset="100%" stop-color="#fffbf0"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bgA)"/>

  <!-- crisp colour-prana rays -->
  <g transform="translate(400 252)" opacity="0.5">
    <path d="M0 0 L-20 -540 L20 -540 Z" fill="#ff5d5d" transform="rotate(0)"/>
    <path d="M0 0 L-20 -540 L20 -540 Z" fill="#ff9f43" transform="rotate(22.5)"/>
    <path d="M0 0 L-20 -540 L20 -540 Z" fill="#ffd23f" transform="rotate(45)"/>
    <path d="M0 0 L-20 -540 L20 -540 Z" fill="#7bed9f" transform="rotate(67.5)"/>
    <path d="M0 0 L-20 -540 L20 -540 Z" fill="#34e0c4" transform="rotate(90)"/>
    <path d="M0 0 L-20 -540 L20 -540 Z" fill="#48b6ff" transform="rotate(112.5)"/>
    <path d="M0 0 L-20 -540 L20 -540 Z" fill="#5b8def" transform="rotate(135)"/>
    <path d="M0 0 L-20 -540 L20 -540 Z" fill="#b07bff" transform="rotate(157.5)"/>
    <path d="M0 0 L-20 -540 L20 -540 Z" fill="#ff5d5d" transform="rotate(180)"/>
    <path d="M0 0 L-20 -540 L20 -540 Z" fill="#ff9f43" transform="rotate(202.5)"/>
    <path d="M0 0 L-20 -540 L20 -540 Z" fill="#ffd23f" transform="rotate(225)"/>
    <path d="M0 0 L-20 -540 L20 -540 Z" fill="#7bed9f" transform="rotate(247.5)"/>
    <path d="M0 0 L-20 -540 L20 -540 Z" fill="#34e0c4" transform="rotate(270)"/>
    <path d="M0 0 L-20 -540 L20 -540 Z" fill="#48b6ff" transform="rotate(292.5)"/>
    <path d="M0 0 L-20 -540 L20 -540 Z" fill="#5b8def" transform="rotate(315)"/>
    <path d="M0 0 L-20 -540 L20 -540 Z" fill="#b07bff" transform="rotate(337.5)"/>
  </g>

  <!-- concentric energy rings -->
  <g fill="none" stroke="#ffffff" transform="translate(400 252)">
    <circle r="118" stroke-opacity="0.28"/>
    <circle r="178" stroke-opacity="0.18"/>
    <circle r="240" stroke-opacity="0.1"/>
  </g>

  <!-- brilliant luminous core -->
  <rect width="800" height="600" fill="url(#coreA)"/>
  <circle cx="400" cy="252" r="30" fill="#ffffff"/>

  <!-- glowing lotus rising at the base -->
  <g transform="translate(400 600)" stroke="#ffffff" stroke-opacity="0.55" stroke-width="1.5">
    <path d="M0 0 C-34 -70 -22 -150 0 -182 C22 -150 34 -70 0 0 Z" fill="url(#petalA)"/>
    <path d="M0 0 C-34 -70 -22 -150 0 -182 C22 -150 34 -70 0 0 Z" fill="url(#petalA)" opacity="0.95" transform="rotate(26)"/>
    <path d="M0 0 C-34 -70 -22 -150 0 -182 C22 -150 34 -70 0 0 Z" fill="url(#petalA)" opacity="0.95" transform="rotate(-26)"/>
    <path d="M0 0 C-30 -60 -20 -128 0 -156 C20 -128 30 -60 0 0 Z" fill="url(#petalA)" opacity="0.9" transform="rotate(50)"/>
    <path d="M0 0 C-30 -60 -20 -128 0 -156 C20 -128 30 -60 0 0 Z" fill="url(#petalA)" opacity="0.9" transform="rotate(-50)"/>
    <path d="M0 0 C-26 -50 -18 -104 0 -128 C18 -104 26 -50 0 0 Z" fill="url(#petalA)" opacity="0.85" transform="rotate(72)"/>
    <path d="M0 0 C-26 -50 -18 -104 0 -128 C18 -104 26 -50 0 0 Z" fill="url(#petalA)" opacity="0.85" transform="rotate(-72)"/>
  </g>

  <!-- sparkles -->
  <g fill="#ffffff">
    <circle cx="170" cy="150" r="4" opacity="0.9"/>
    <circle cx="650" cy="120" r="3.5" opacity="0.8"/>
    <circle cx="700" cy="300" r="5" opacity="0.6"/>
    <circle cx="120" cy="320" r="4" opacity="0.65"/>
    <circle cx="560" cy="430" r="3.5" opacity="0.7"/>
    <circle cx="250" cy="470" r="3" opacity="0.7"/>
    <circle cx="480" cy="90" r="3" opacity="0.85"/>
  </g>
</svg>
